<!DOCTYPE html>
<html>
<head>
    <title>Storyboard</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }

        p {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h2>Generated Storyboard</h2>

{% for item in results %}
<div class="card">
    <img src="{{ item.image }}">
    <p>{{ item.text }}</p>
</div>
{% endfor %}

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empathy Engine — AI Human Voice 🎤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #050510;
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff;
            --accent2: #92fe9d;
            --text: #e8e8f0;
            --muted: #6b6b85;
            --radius: 20px;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px 80px;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(146, 254, 157, 0.05) 0%, transparent 40%);
        }

        /* Navigation */
        nav {
            width: 100%;
            max-width: 1200px;
            padding: 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .nav-links {
            display: flex;
            gap: 32px;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent);
        }

        header {
            text-align: center;
            margin-bottom: 48px;
            max-width: 600px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .subtitle {
            color: var(--muted);
            line-height: 1.6;
        }

        .main-card {
            width: 100%;
            max-width: 680px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 18px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #result-area {
            display: none;
            margin-top: 40px;
            animation: fadeIn 0.5s ease;
            width: 100%;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emotion-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .Positive {
            background: rgba(146, 254, 157, 0.15);
            color: #92fe9d;
            border: 1px solid rgba(146, 254, 157, 0.3);
        }

        .Negative {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .Neutral {
            background: rgba(107, 107, 133, 0.15);
            color: #a8a8c0;
            border: 1px solid rgba(107, 107, 133, 0.3);
        }

        .audio-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        .param-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .param-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .param-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            display: block;
        }

        .param-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--muted);
        }

        footer {
            margin-top: 80px;
            color: var(--muted);
            font-size: 12px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">✦ EMPATHY_GEN</div>
        <div class="nav-links">
            <a href="/">Pitch Visualizer</a>
            <a href="/empathy" class="active">Empathy Engine</a>
        </div>
    </nav>

    <header>
        <h1>The Empathy Engine</h1>
        <p class="subtitle">AI that listens to your emotion and speaks with a human soul. Modulation of pitch, rate, and
            volume based on detected sentiment.</p>
    </header>

    <div class="main-card">
        <form id="empathy-form">
            <label>Source Text</label>
            <textarea id="text-input"
                placeholder="Type something emotional... e.g., 'I am so excited about this new opportunity!' or 'I'm very disappointed with the recent delays.'"></textarea>
            <button type="submit" class="btn" id="submit-btn">🎭 Analyse & Speak</button>
        </form>

        <div id="result-area">
            <div id="emotion-display" class="emotion-badge"></div>

            <div class="audio-container">
                <div class="param-grid">
                    <div class="param-box">
                        <span class="param-val" id="val-rate">150</span>
                        <span class="param-label">Rate (WPM)</span>
                    </div>
                    <div class="param-box">
                        <span class="param-val" id="val-pitch">+10</span>
                        <span class="param-label">Pitch Shift</span>
                    </div>
                    <div class="param-box">
                        <span class="param-val" id="val-volume">0.8</span>
                        <span class="param-label">Amplitude</span>
                    </div>
                </div>
                <audio id="audio-player" controls></audio>
            </div>
        </div>
    </div>

    <footer>Built for Challenge 1 · Using VADER Sentiment & pyttsx3</footer>

    <script>
        const form = document.getElementById('empathy-form');
        const btn = document.getElementById('submit-btn');
        const input = document.getElementById('text-input');
        const resultArea = document.getElementById('result-area');
        const emotionDisplay = document.getElementById('emotion-display');
        const audioPlayer = document.getElementById('audio-player');

        const icons = { "Positive": "😊", "Negative": "😠", "Neutral": "😐" };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.textContent = "Processing...";
            resultArea.style.display = 'none';

            const formData = new FormData();
            formData.append('text', text);

            try {
                const response = await fetch('/process-empathy', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.error) throw new Error(data.error);

                // Update UI
                emotionDisplay.className = `emotion-badge ${data.emotion}`;
                emotionDisplay.innerHTML = `<span>${icons[data.emotion]}</span> <span>${data.emotion} (Intensity: ${data.intensity})</span>`;

                document.getElementById('val-rate').textContent = data.params.rate;
                document.getElementById('val-pitch').textContent = (data.params.pitch > 0 ? '+' : '') + data.params.pitch;
                document.getElementById('val-volume').textContent = data.params.volume;

                audioPlayer.src = data.audio_url;
                resultArea.style.display = 'block';

                // Auto play
                setTimeout(() => audioPlayer.play(), 200);

            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "🎭 Analyse & Speak";
            }
        });
    </script>
</body>

</html>
